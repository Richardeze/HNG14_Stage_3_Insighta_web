<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Insighta Labs+</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <div class="inner">
      <span class="logo">Insighta Labs+</span>
      <div class="nav-links">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="profiles.html">Profiles</a>
        <a href="search.html">Search</a>
        <a href="account.html">Account</a>
        <div id="nav-user"></div>
      </div>
    </div>
  </nav>
  <main>
    <div class="container">
      <div class="page-header">
        <h1>Dashboard</h1>
      </div>
      <div class="stats-grid" id="stats">
        <div class="card"><h2>Total Profiles</h2><div class="value" id="total">—</div></div>
        <div class="card"><h2>Male Profiles</h2><div class="value" id="male">—</div></div>
        <div class="card"><h2>Female Profiles</h2><div class="value" id="female">—</div></div>
        <div class="card"><h2>Countries</h2><div class="value" id="countries">—</div></div>
      </div>
      <div class="card">
        <h2 style="margin-bottom:16px;font-size:18px;color:#e6edf3">Recent Profiles</h2>
        <div id="recent"><div class="loader">Loading...</div></div>
      </div>
    </div>
  </main>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pages/dashboard.js"></script>
</body>
</html>
