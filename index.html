<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insighta Labs+ — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="logo-big">Insighta Labs+</div>
      <p>Demographic intelligence platform.<br>Sign in to continue.</p>
      <a href="http://127.0.0.1:8000/auth/github" class="btn btn-github">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        Continue with GitHub
      </a>
      <p style="margin-top:24px;font-size:12px;color:#484f58">
        By signing in, you agree to our terms of service.
      </p>
    </div>
  </div>
  <script>
    const token = sessionStorage.getItem('access_token');
    if (token) {
      fetch('http://127.0.0.1:8000/auth/me', {
        headers: {
          'Authorization': 'Bearer ' + token,
          'X-API-Version': '1'
        }
      }).then(r => { if (r.ok) window.location.href = '/dashboard.html'; })
        .catch(() => {});
    }
  </script>
</body>
</html>
